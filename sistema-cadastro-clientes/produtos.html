<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>📦 Sistema de Cadastro de Produtos</h1>
                <div class="user-menu">
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='index.html'">🏠 Início</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='vendas.html'">💰 PDV</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='usuarios.html'">👥 Usuários</button>
                    <button class="btn btn-secondary btn-small" onclick="logout()">🚪 Sair</button>
                    <span id="userDisplay">Olá, Usuário</span>
                </div>
            </div>
        </header>

        <main>
            <section class="form-section">
                <h2>📝 Novo Produto</h2>
                <form id="productForm">
                    <div class="form-group">
                        <label for="name">Nome do Produto:</label>
                        <input type="text" id="name" name="name" required placeholder="Digite o nome do produto">
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="description">Descrição:</label>
                        <textarea id="description" name="description" required placeholder="Digite a descrição do produto" rows="3"></textarea>
                        <span class="error-message" id="descriptionError"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Preço (R$):</label>
                            <input type="text" id="price" name="price" required placeholder="0,00">
                            <span class="error-message" id="priceError"></span>
                        </div>

                        <div class="form-group">
                            <label for="quantity">Quantidade em Estoque:</label>
                            <input type="number" id="quantity" name="quantity" required placeholder="0" min="0">
                            <span class="error-message" id="quantityError"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="category">Categoria:</label>
                        <select id="category" name="category" required>
                            <option value="">Selecione uma categoria</option>
                            <option value="eletronicos">Eletrônicos</option>
                            <option value="roupas">Roupas</option>
                            <option value="calcados">Calçados</option>
                            <option value="acessorios">Acessórios</option>
                            <option value="moveis">Móveis</option>
                            <option value="alimentos">Alimentos</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="outros">Outros</option>
                        </select>
                        <span class="error-message" id="categoryError"></span>
                    </div>

                    <input type="hidden" id="productId">

                    <button type="submit" id="submitBtn" class="btn btn-primary">💾 Cadastrar Produto</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-secondary" style="display: none;" onclick="cancelEdit()">❌ Cancelar Edição</button>
                    <button type="reset" class="btn btn-secondary" onclick="resetForm()">🔄 Limpar Formulário</button>
                </form>
            </section>

            <section class="search-section">
                <h2>🔍 Buscar Produtos</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar por nome, categoria ou descrição...">
                    <button type="button" id="searchBtn" class="btn btn-search">Buscar</button>
                </div>
            </section>

            <section class="list-section">
                <h2>📋 Produtos Cadastrados <span id="productCount">(0)</span></h2>
                <div class="table-container">
                    <table id="productTable">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Categoria</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productList">
                            <!-- Produtos serão inseridos aqui via JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div id="noProductsMessage" class="no-data">
                    Nenhum produto cadastrado ainda.
                </div>
            </section>
        </main>

        <footer>
            <p>© 2024 Sistema de Cadastro de Produtos</p>
        </footer>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir este produto?</p>
            <p id="productToDelete" class="product-name"></p>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="confirmDelete()">Sim, Excluir</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="produtos.js"></script>
</body>
</html>
