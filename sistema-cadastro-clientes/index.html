<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Clientes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🏢 Sistema de Cadastro de Clientes</h1>
                <div class="user-menu">
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='vendas.html'">💰 PDV</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='produtos.html'">📦 Produtos</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='usuarios.html'">👥 Usuários</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='relatorios.html'">📊 Relatórios</button>
                    <button class="btn btn-secondary btn-small menu-item-admin" onclick="window.location.href='parametros.html'">⚙️ Parâmetros</button>
                    <button class="btn btn-secondary btn-small" onclick="logout()">🚪 Sair</button>
                    <span id="userDisplay">Olá, Usuário</span>
                </div>
            </div>
        </header>

        <main>
            <section class="form-section">
                <h2>📝 Novo Cliente</h2>
                <form id="clientForm">
                    <div class="form-group">
                        <label for="name">Nome Completo:</label>
                        <input type="text" id="name" name="name" required placeholder="Digite o nome completo">
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefone:</label>
                        <input type="tel" id="phone" name="phone" required placeholder="(00) 00000-0000">
                        <span class="error-message" id="phoneError"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 200px;">
                            <label for="cep">CEP:</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="cep" name="cep" placeholder="00000-000" style="width: 150px;">
                                <button type="button" class="btn btn-secondary btn-small" onclick="searchCEP()" style="margin-top: 0;">🔍 Buscar</button>
                            </div>
                            <span class="error-message" id="cepError"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Endereço:</label>
                        <input type="text" id="address" name="address" required placeholder="Rua, número, bairro, cidade">
                        <span class="error-message" id="addressError"></span>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
                        <span class="error-message" id="cpfError"></span>
                    </div>

                    <input type="hidden" id="clientId">

                    <button type="submit" id="submitBtn" class="btn btn-primary">💾 Cadastrar Cliente</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-secondary" style="display: none;" onclick="cancelEdit()">❌ Cancelar Edição</button>
                    <button type="reset" class="btn btn-secondary" onclick="resetForm()">🔄 Limpar Formulário</button>
                </form>
            </section>

            <section class="search-section">
                <h2>🔍 Buscar Clientes</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar por nome, email ou CPF...">
                    <button type="button" id="searchBtn" class="btn btn-search">Buscar</button>
                </div>
            </section>

            <section class="list-section">
                <h2>📋 Clientes Cadastrados <span id="clientCount">(0)</span></h2>
                <div class="table-container">
                    <table id="clientTable">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th>Endereço</th>
                                <th>CPF</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="clientList">
                            <!-- Clientes serão inseridos aqui via JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div id="noClientsMessage" class="no-data">
                    Nenhum cliente cadastrado ainda.
                </div>
            </section>
        </main>

        <footer>
            <p>© 2024 Sistema de Cadastro de Clientes</p>
        </footer>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir este cliente?</p>
            <p id="clientToDelete" class="client-name"></p>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="confirmDelete()">Sim, Excluir</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        // Verificar se é admin para acessar esta página
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkPermission('adm')) return;
        });
    </script>
</body>
</html>
