<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parâmetros da Empresa - Sistema de Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Parâmetros da Empresa</h1>
                <div class="user-menu">
                    <span id="userName"></span>
                    <button class="btn btn-secondary btn-small" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>

        <main>
            <section class="form-section">
                <h2>Selecionar Empresa</h2>
                
                <div class="form-group">
                    <label for="empresaSelect">Selecione a Empresa:</label>
                    <select id="empresaSelect" onchange="selecionarEmpresa()">
                        <option value="">-- Selecione uma empresa --</option>
                    </select>
                </div>

                <!-- Campo oculto para armazenar o ID (não visível ao usuário) -->
                <input type="hidden" id="empresaId">

                <hr style="margin: 20px 0;">

                <h2>Configurações de Personalização</h2>

                <div class="form-group">
                    <label for="nomeEmpresa">Nome da Empresa</label>
                    <input type="text" id="nomeEmpresa" placeholder="Nome da empresa que aparecerá no sistema">
                </div>

                <div class="form-group">
                    <label for="logoUrl">URL do Logo</label>
                    <input type="text" id="logoUrl" placeholder="https://exemplo.com/logo.png">
                </div>

                <h3>Cores do Sistema</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="corPrimaria">Cor Primária</label>
                        <input type="color" id="corPrimaria" value="#667eea">
                    </div>
                    
                    <div class="form-group">
                        <label for="corSecundaria">Cor Secundária</label>
                        <input type="color" id="corSecundaria" value="#764ba2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="corFundo">Cor de Fundo</label>
                        <input type="color" id="corFundo" value="#ffffff">
                    </div>
                    
                    <div class="form-group">
                        <label for="corTexto">Cor do Texto</label>
                        <input type="color" id="corTexto" value="#333333">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="corBotao">Cor do Botão</label>
                        <input type="color" id="corBotao" value="#667eea">
                    </div>
                    
                    <div class="form-group">
                        <label for="corBotaoTexto">Cor do Texto do Botão</label>
                        <input type="color" id="corBotaoTexto" value="#ffffff">
                    </div>
                </div>

                <div class="form-group">
                    <label for="mensagemBoasVindas">Mensagem de Boas-Vindas</label>
                    <textarea id="mensagemBoasVindas" rows="3" placeholder="Mensagem que aparecerá na tela inicial"></textarea>
                </div>

                <div class="form-group">
                    <label for="chavePix">Chave PIX da Empresa</label>
                    <input type="text" id="chavePix" placeholder="CPF, CNPJ, e-mail ou chave aleatória">
                    <small>Essa chave será usada no PDV para gerar o QR Code PIX.</small>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="ativo" checked> Ativo
                    </label>
                </div>

                <button class="btn btn-primary" onclick="salvarParametros()">💾 Salvar Parâmetros</button>
                <button class="btn btn-secondary" onclick="resetarParametros()">↩️ Restaurar</button>
            </section>

            <section class="form-section">
                <h3>Pré-visualização</h3>
                <div id="preview" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-top: 10px;">
                    <h4 id="previewEmpresa" style="margin-bottom: 10px;">Nome da Empresa</h4>
                    <button id="previewBotao" style="padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Botão de Exemplo</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Sistema de Cadastro</p>
        </footer>
    </div>

    <script src="auth.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        // Variável global para armazenar o ID do parâmetro
        let parametroId = null;
        const DEFAULT_PIX_KEY = 'pix@lojapdv.com';

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            displayUserName();
            setupPreviewListeners();
            carregarEmpresas(); // Carregar lista de empresas ao iniciar
        });

        // Carregar lista de empresas cadastradas
        async function carregarEmpresas() {
            try {
                const response = await fetch('http://localhost:8080/api/parametros-empresa', {
                    headers: {
                        'Authorization': 'Bearer ' + getToken()
                    }
                });

                if (response.ok) {
                    const parametros = await response.json();
                    const select = document.getElementById('empresaSelect');
                    
                    // Limpar opções existentes (exceto a primeira)
                    select.innerHTML = '<option value="">-- Selecione uma empresa --</option>';
                    
                    // Adicionar empresas dos parâmetros cadastrados
                    parametros.forEach(function(param) {
                        const option = document.createElement('option');
                        option.value = param.empresaId;
                        option.textContent = (param.nomeEmpresa || 'Empresa ' + param.empresaId) + ' (ID: ' + param.empresaId + ')';
                        select.appendChild(option);
                    });
                } else {
                    console.error('Erro ao carregar empresas');
                }
            } catch (error) {
                console.error('Erro ao carregar empresas:', error);
            }
        }

        // Selecionar empresa e carregar parâmetros
        async function selecionarEmpresa() {
            const empresaId = document.getElementById('empresaSelect').value;
            document.getElementById('empresaId').value = empresaId;

            if (!empresaId) {
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/parametros-empresa/empresa/' + empresaId, {
                    headers: {
                        'Authorization': 'Bearer ' + getToken()
                    }
                });

                if (response.ok) {
                    const params = await response.json();
                    preencherFormulario(params);
                    
                    localStorage.setItem('selectedEmpresaId', empresaId);
                    localStorage.setItem('empresaParams', JSON.stringify(params));
                    
                    applyClientStyles(params);
                    
                    showAlert('Parâmetros da empresa "' + (params.nomeEmpresa || empresaId) + '" carregados e aplicados!', 'success');
                } else if (response.status === 404) {
                    showAlert('Empresa selecionada não tem parâmetros cadastrados.', 'info');
                } else {
                    showAlert('Erro ao carregar parâmetros da empresa', 'error');
                }
            } catch (error) {
                console.error('Erro ao selecionar empresa:', error);
                showAlert('Erro de conexão', 'error');
            }
        }

        // Configurar listeners para pré-visualização
        function setupPreviewListeners() {
            const campos = ['nomeEmpresa', 'corPrimaria', 'corSecundaria', 'corFundo', 'corBotao', 'corBotaoTexto'];
            
            campos.forEach(function(campo) {
                const elemento = document.getElementById(campo);
                if (elemento) {
                    elemento.addEventListener('input', atualizarPreVisualizacao);
                }
            });
        }

        // Atualizar pré-visualização
        function atualizarPreVisualizacao() {
            const nomeEmpresa = document.getElementById('nomeEmpresa').value || 'Nome da Empresa';
            const corPrimaria = document.getElementById('corPrimaria').value;
            const corSecundaria = document.getElementById('corSecundaria').value;
            const corFundo = document.getElementById('corFundo').value;
            const corBotao = document.getElementById('corBotao').value;
            const corBotaoTexto = document.getElementById('corBotaoTexto').value;

            const preview = document.getElementById('preview');
            const previewEmpresa = document.getElementById('previewEmpresa');
            const previewBotao = document.getElementById('previewBotao');

            preview.style.backgroundColor = corFundo;
            preview.style.borderColor = corPrimaria;
            previewEmpresa.textContent = nomeEmpresa;
            previewEmpresa.style.color = corPrimaria;
            
            previewBotao.style.background = 'linear-gradient(135deg, ' + corPrimaria + ' 0%, ' + corSecundaria + ' 100%)';
            previewBotao.style.color = corBotaoTexto;
        }

        // Preencher formulário com os parâmetros
        function preencherFormulario(params) {
            parametroId = params.id;
            document.getElementById('empresaId').value = params.empresaId || '';
            document.getElementById('nomeEmpresa').value = params.nomeEmpresa || '';
            document.getElementById('logoUrl').value = params.logoUrl || '';
            document.getElementById('corPrimaria').value = params.corPrimaria || '#667eea';
            document.getElementById('corSecundaria').value = params.corSecundaria || '#764ba2';
            document.getElementById('corFundo').value = params.corFundo || '#ffffff';
            document.getElementById('corTexto').value = params.corTexto || '#333333';
            document.getElementById('corBotao').value = params.corBotao || '#667eea';
            document.getElementById('corBotaoTexto').value = params.corBotaoTexto || '#ffffff';
            document.getElementById('mensagemBoasVindas').value = params.mensagemBoasVindas || '';
            document.getElementById('chavePix').value = params.chavePix || '';
            document.getElementById('ativo').checked = params.ativo !== false;
            
            atualizarPreVisualizacao();
        }

        // Obter valores do formulário
        function obterParametrosFormulario() {
            return {
                id: parametroId,
                empresaId: parseInt(document.getElementById('empresaId').value),
                nomeEmpresa: document.getElementById('nomeEmpresa').value,
                logoUrl: document.getElementById('logoUrl').value,
                corPrimaria: document.getElementById('corPrimaria').value,
                corSecundaria: document.getElementById('corSecundaria').value,
                corFundo: document.getElementById('corFundo').value,
                corTexto: document.getElementById('corTexto').value,
                corBotao: document.getElementById('corBotao').value,
                corBotaoTexto: document.getElementById('corBotaoTexto').value,
                mensagemBoasVindas: document.getElementById('mensagemBoasVindas').value,
                chavePix: document.getElementById('chavePix').value.trim() || DEFAULT_PIX_KEY,
                ativo: document.getElementById('ativo').checked
            };
        }

        async function salvarParametros() {
            const params = obterParametrosFormulario();
            
            // Se não tiver ID da empresa, gerar um automaticamente
            if (!params.empresaId || isNaN(params.empresaId)) {
                params.empresaId = Math.floor(Math.random() * 10000) + 1;
            }

            try {
                const response = await fetch('http://localhost:8080/api/parametros-empresa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify(params)
                });

                if (response.ok) {
                    const savedParams = await response.json();
                    parametroId = savedParams.id;
                    
                    // Salvar no localStorage para todas as telas
                    localStorage.setItem('selectedEmpresaId', params.empresaId);
                    localStorage.setItem('empresaParams', JSON.stringify(savedParams));
                    
                    // Aplicar estilos em todas as telas
                    setSelectedEmpresaId(params.empresaId);
                    applyClientStyles(savedParams);
                    
                    // Recarregar a página para aplicar em todas as telas
                    showAlert('Parâmetros salvos e aplicados com sucesso!', 'success');
                } else {
                    showAlert('Erro ao salvar parâmetros', 'error');
                }
            } catch (error) {
                console.error('Erro ao salvar parâmetros:', error);
                showAlert('Erro ao salvar parâmetros', 'error');
            }
        }

        // Restaurar parâmetros padrão do sistema
        function resetarParametros() {
            if (!confirm('Tem certeza que deseja restaurar os parâmetros padrão do sistema?')) {
                return;
            }

            localStorage.removeItem('selectedEmpresaId');
            localStorage.removeItem('empresaParams');

            document.getElementById('empresaSelect').value = '';
            document.getElementById('empresaId').value = '';
            
            document.getElementById('nomeEmpresa').value = 'Sistema de Cadastro';
            document.getElementById('logoUrl').value = '';
            document.getElementById('corPrimaria').value = '#667eea';
            document.getElementById('corSecundaria').value = '#764ba2';
            document.getElementById('corFundo').value = '#ffffff';
            document.getElementById('corTexto').value = '#333333';
            document.getElementById('corBotao').value = '#667eea';
            document.getElementById('corBotaoTexto').value = '#ffffff';
            document.getElementById('mensagemBoasVindas').value = '';
            document.getElementById('chavePix').value = DEFAULT_PIX_KEY;
            document.getElementById('ativo').checked = true;

            const styleTag = document.getElementById('custom-client-styles');
            if (styleTag) {
                styleTag.remove();
            }

            applyDefaultStyles();
            atualizarPreVisualizacao();

            showAlert('Parâmetros padrão restaurados com sucesso!', 'success');
        }
    </script>
</body>
</html>
