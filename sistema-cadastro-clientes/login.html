<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Cadastro de Clientes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        
        .login-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .login-form input.error {
            border-color: #e74c3c;
        }
        
        .login-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .login-error.show {
            display: block;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .user-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .user-info span {
            color: #667eea;
            font-weight: 600;
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .pdv-aviso-retaguarda {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #e8f4fd;
            border: 1px solid #90caf9;
            color: #1565c0;
            font-size: 0.9rem;
            line-height: 1.45;
        }
        .confirm-cadastro-content {
            max-width: 420px;
            padding: 32px 28px 28px;
            border-top: 4px solid #667eea;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.18);
        }
        .confirm-cadastro-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.18), rgba(118, 75, 162, 0.14));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a67d8;
        }
        .confirm-cadastro-icon svg {
            width: 32px;
            height: 32px;
        }
        .confirm-cadastro-content h3 {
            color: #2c3e50;
            font-size: 1.25rem;
            margin-bottom: 10px;
        }
        .confirm-cadastro-user {
            font-weight: 700;
            color: #667eea;
            font-size: 1rem;
            margin: 0 0 14px;
            word-break: break-all;
        }
        .confirm-cadastro-msg {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 8px;
        }
        .confirm-cadastro-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .confirm-cadastro-actions .btn {
            min-width: 148px;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
        }
        .confirm-cadastro-modal-wrap.modal {
            background: rgba(44, 62, 80, 0.45);
            backdrop-filter: blur(6px);
        }
        .sessao-ativa-banner {
            display: none;
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12), rgba(118, 75, 162, 0.08));
            border: 1px solid rgba(102, 126, 234, 0.35);
            font-size: 0.9rem;
            color: #444;
        }
        .sessao-ativa-banner.show { display: block; }
        .sessao-ativa-banner strong { color: #667eea; }
        .sessao-ativa-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .sessao-ativa-btns button { flex: 1; min-width: 120px; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        #sessaoIrSistema { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        #sessaoSairConta { background: #f1f3f5; color: #495057; border: 2px solid #e9ecef; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🏢 Sistema de Clientes</h1>
                <p>Acesse sua conta para continuar</p>
            </div>

            <div id="pdvAvisoRetaguarda" class="pdv-aviso-retaguarda" style="display:none;" role="status"></div>

            <div id="sessaoAtivaBanner" class="sessao-ativa-banner" role="region" aria-label="Sessão já ativa">
                <span>Sessão ativa: <strong id="sessaoAtivaUser">—</strong>. Use o botão abaixo ou saia para entrar com outra conta.</span>
                <div class="sessao-ativa-btns">
                    <button type="button" id="sessaoIrSistema">Continuar no sistema</button>
                    <button type="button" id="sessaoSairConta">Sair desta conta</button>
                </div>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário:</label>
                    <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
                </div>
                
                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required placeholder="Digite sua senha">
                </div>
                
                <div class="login-error" id="loginError">
                    Usuário ou senha incorretos!
                </div>
                
                <button type="submit" class="btn btn-primary btn-login">🔐 Entrar</button>
            </form>
            
            <div class="register-link">
                <p>Primeiro acesso? <a href="#" onclick="showRegister()">Cadastre-se</a></p>
            </div>
        </div>

        <div id="confirmCadastroModal" class="modal confirm-cadastro-modal-wrap" role="dialog" aria-labelledby="confirmCadastroTitle" aria-modal="true">
            <div class="modal-content confirm-cadastro-content">
                <div class="confirm-cadastro-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <h3 id="confirmCadastroTitle">Usuário não cadastrado</h3>
                <p id="confirmCadastroUsernameHint" class="confirm-cadastro-user"></p>
                <p class="confirm-cadastro-msg">Deseja se cadastrar? Abriremos o formulário para você criar sua conta.</p>
                <div class="modal-buttons confirm-cadastro-actions">
                    <button type="button" class="btn btn-primary" id="confirmCadastroSim">Sim, cadastrar</button>
                    <button type="button" class="btn btn-secondary" id="confirmCadastroNao">Não</button>
                </div>
            </div>
        </div>
        
        <!-- Modal de Cadastro de Usuário -->
        <div id="registerModal" class="modal">
            <div class="modal-content">
                <h3>📝 Novo Usuário</h3>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="newUsername">Usuário:</label>
                        <input type="text" id="newUsername" required placeholder="Digite um usuário">
                    </div>
                    <!-- A empresa vigente é definida automaticamente pelo sistema -->
                    <input type="hidden" id="registerEmpresaId">
                    <div class="form-group">
                        <label for="registerCodigoConvite">Código de convite</label>
                        <input type="text" id="registerCodigoConvite" required autocomplete="off" placeholder="Fornecido pelo administrador">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Senha:</label>
                        <input type="password" id="newPassword" required placeholder="Digite uma senha">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Senha:</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirme a senha">
                    </div>
                    
                    <div class="login-error" id="registerError"></div>
                    
                    <div class="modal-buttons">
                        <button type="submit" class="btn btn-primary">💾 Cadastrar</button>
                        <button type="button" class="btn btn-secondary" onclick="closeRegisterModal()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
    <script src="theme-defaults.js"></script>
    <script src="config.js"></script>
</body>
</html>
