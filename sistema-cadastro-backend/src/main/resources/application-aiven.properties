# Profile: aiven — MySQL na Aiven
# Ativar: SPRING_PROFILES_ACTIVE=aiven
# Senha: use variável DB_PASSWORD (não commitar senhas no repositório)

spring.datasource.url=jdbc:mysql://sistema-cadastro-kleberduartesouza-7951.a.aivencloud.com:17300/defaultdb?sslMode=REQUIRED&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Primeira carga no defaultdb: criar/atualizar tabelas (ajuste para validate após estabilizar)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:200}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
