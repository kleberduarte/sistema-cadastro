# Configurações do Banco de Dados - Produção (Render - PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dbathos?createDatabaseIfNotExist=true&ssl=false}
spring.datasource.username=${DB_USER:athos}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Servidor
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKey12345678901234567890}
jwt.expiration=86400000

# CORS - Allow all origins in production
cors.allowed-origins=*

