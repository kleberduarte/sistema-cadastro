# ===============================
# Production profile (release candidate)
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ===============================

# Render / Docker: escutar em 0.0.0.0 para o scan de porta do health check.
server.address=0.0.0.0
# Menos beans na subida = Tomcat abre a porta mais rápido (1ª requisição pode aquecer o restante).
spring.main.lazy-initialization=true

# Inicializa repositórios JPA em thread separada após o contexto subir — reduz tempo até o Tomcat
# aceitar conexões (health check do Render falha se a porta não abrir a tempo).
spring.data.jpa.repositories.bootstrap-mode=deferred
# JMX não é necessário no container e economiza um pouco na subida.
spring.jmx.enabled=false

# Evita sessão JPA aberta durante serialização JSON (REST); remove WARN JpaWebConfiguration.
# Entidades expostas (ex.: Usuario em /auth/me) não têm coleções lazy.
spring.jpa.open-in-view=false

# Mandatory production environment variables (no insecure defaults)
# Importação em massa: adicione na DB_URL do MySQL Connector/J:
#   &rewriteBatchedStatements=true
# (reduz round-trips; combine com o batch JDBC do ProdutoService.)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:200}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Produção: limitar por IP; ajuste via env se necessário
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_PER_MINUTE:180}
app.rate-limit.skip-localhost=${RATE_LIMIT_SKIP_LOCALHOST:false}

# Respostas JSON/HTML menores na rede (lista de produtos, vendas, etc.)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# Sync automático de PMC em produção (habilite por env)
app.pmc.sync.enabled=${PMC_SYNC_ENABLED:false}
app.pmc.sync.cron=${PMC_SYNC_CRON:0 0 3 * * *}
app.pmc.sync.url=${PMC_SYNC_URL:}
app.pmc.sync.auth-header=${PMC_SYNC_AUTH_HEADER:Authorization}
app.pmc.sync.token=${PMC_SYNC_TOKEN:}
app.pmc.sync.token-prefix=${PMC_SYNC_TOKEN_PREFIX:Bearer }
app.pmc.sync.format=${PMC_SYNC_FORMAT:auto}
app.pmc.sync.method=${PMC_SYNC_METHOD:GET}
app.pmc.sync.post-body=${PMC_SYNC_POST_BODY:}
