# ===============================
# Production profile (release candidate)
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ===============================

# Mandatory production environment variables (no insecure defaults)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:200}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ProduĂ§ĂŁo: limitar por IP; ajuste via env se necessĂĄrio
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_PER_MINUTE:180}
app.rate-limit.skip-localhost=${RATE_LIMIT_SKIP_LOCALHOST:false}
