# ===============================
# Production profile (release candidate)
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ===============================

# Render / Docker: escutar em 0.0.0.0 para o scan de porta do health check.
server.address=0.0.0.0
# lazy-initialization=true faz o Hibernate validar o schema antes do Flyway em alguns casos
# (missing table). FlywayBeforeJpaBeanPostProcessor tambĂ©m forĂ§a ordem, mas manter false Ă© mais seguro.
spring.main.lazy-initialization=false

# Inicializa repositĂłrios JPA em thread separada apĂłs o contexto subir â€” reduz tempo atĂ© o Tomcat
# aceitar conexĂµes (health check do Render falha se a porta nĂŁo abrir a tempo).
spring.data.jpa.repositories.bootstrap-mode=deferred
# JMX nĂŁo Ă© necessĂˇrio no container e economiza um pouco na subida.
spring.jmx.enabled=false

# Evita sessĂŁo JPA aberta durante serializaĂ§ĂŁo JSON (REST); remove WARN JpaWebConfiguration.
# Entidades expostas (ex.: Usuario em /auth/me) nĂŁo tĂŞm coleĂ§Ăµes lazy.
spring.jpa.open-in-view=false

# Mandatory production environment variables (no insecure defaults)
# ImportaĂ§ĂŁo em massa: adicione na DB_URL do MySQL Connector/J:
#   &rewriteBatchedStatements=true
# (reduz round-trips; combine com o batch JDBC do ProdutoService.)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
# Flyway (classpath:db/migration) executa antes do Hibernate; necessĂˇrio pois ddl-auto=validate
# e app.startup.migrations.enabled=false impedem ApplicationRunner de criar tabelas a tempo.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:200}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ProduĂ§ĂŁo: limitar por IP; ajuste via env se necessĂˇrio
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_PER_MINUTE:180}
app.rate-limit.skip-localhost=${RATE_LIMIT_SKIP_LOCALHOST:false}

# Em prod, evita migrations JDBC no startup (schema deve vir previamente alinhado).
app.startup.migrations.enabled=${APP_STARTUP_MIGRATIONS_ENABLED:false}

# Respostas JSON/HTML menores na rede (lista de produtos, vendas, etc.)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# Sync automĂˇtico de PMC em produĂ§ĂŁo (habilite por env)
app.pmc.sync.enabled=${PMC_SYNC_ENABLED:false}
app.pmc.sync.cron=${PMC_SYNC_CRON:0 0 3 * * *}
app.pmc.sync.url=${PMC_SYNC_URL:}
app.pmc.sync.auth-header=${PMC_SYNC_AUTH_HEADER:Authorization}
app.pmc.sync.token=${PMC_SYNC_TOKEN:}
app.pmc.sync.token-prefix=${PMC_SYNC_TOKEN_PREFIX:Bearer }
app.pmc.sync.format=${PMC_SYNC_FORMAT:auto}
app.pmc.sync.method=${PMC_SYNC_METHOD:GET}
app.pmc.sync.post-body=${PMC_SYNC_POST_BODY:}
