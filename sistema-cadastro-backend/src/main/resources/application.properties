# Configurações do Banco de Dados (dev default + override por env)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/athos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway: mesmo sem profile prod (ex.: env esquecida no PaaS), schema legado sem history nao aborta o contexto.
spring.flyway.baseline-on-migrate=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Em produção defina JPA_SHOW_SQL=false (menos I/O no log; login e demais requests ficam mais leves sob carga).
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
# Dialet MySQL inferido automaticamente (Hibernate 6); evita HHH90000025 se definir explicitamente
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

# Configurações de fuso horário para o Java e Hibernate
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# PDV: usuários sem empresaId usam este ID (mesmo conceito do “padrão” na retaguarda)
app.pdv.empresa-padrao-id=1

# Servidor (Render e outros PaaS usam PORT; local pode usar SERVER_PORT)
server.port=${PORT:${SERVER_PORT:8080}}
# PaaS / Docker: escutar em todas as interfaces (evita health check "no open ports")
server.address=0.0.0.0

# JWT
jwt.secret=${JWT_SECRET:dev-only-change-me-with-at-least-32-bytes}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost,http://127.0.0.1,http://localhost:8080}

# Rate limit (429): SPA + várias abas pode exceder limites baixos; em localhost o padrão é não limitar (dev).
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_PER_MINUTE:180}
app.rate-limit.skip-localhost=${RATE_LIMIT_SKIP_LOCALHOST:true}

# Migrations JDBC de startup (dev: ligado por padrão; prod desliga no profile).
app.startup.migrations.enabled=${APP_STARTUP_MIGRATIONS_ENABLED:true}

# PMC sync automático (desligado por padrão em dev)
app.pmc.sync.enabled=${PMC_SYNC_ENABLED:false}
app.pmc.sync.cron=${PMC_SYNC_CRON:0 0 3 * * *}
app.pmc.sync.url=${PMC_SYNC_URL:}
app.pmc.sync.auth-header=${PMC_SYNC_AUTH_HEADER:Authorization}
app.pmc.sync.token=${PMC_SYNC_TOKEN:}
app.pmc.sync.token-prefix=${PMC_SYNC_TOKEN_PREFIX:Bearer }
app.pmc.sync.format=${PMC_SYNC_FORMAT:auto}
app.pmc.sync.method=${PMC_SYNC_METHOD:GET}
app.pmc.sync.post-body=${PMC_SYNC_POST_BODY:}
